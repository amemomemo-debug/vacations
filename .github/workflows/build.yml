name: Build Protected Vacations App
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy==1.26.4 pandas==2.2.2 openpyxl==3.1.2 pyinstaller==6.6.0 pyarmor customtkinter

    - name: Obfuscate Code (PyArmor)
      run: pyarmor gen vacations.py

    - name: Create Final EXE
      # قمنا بإضافة --collect-submodules و --collect-all لضمان شمولية tkinter و pandas
      run: |
        pyinstaller --onefile --noconsole --clean `
        --collect-all pandas `
        --collect-all numpy `
        --collect-all tkinter `
        --collect-all customtkinter `
        --hidden-import tkinter.messagebox `
        --hidden-import tkinter.filedialog `
        dist/vacations.py

    - name: Upload Protected Program
      uses: actions/upload-artifact@v4
      with:
        name: Vacations_System_Final_Fixed
        path: dist/*.exe
