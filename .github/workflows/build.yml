name: Build My Vacations App
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create EXE
      # هذا السطر مهم جداً لأنه يحل مشكلة الـ Recursion اللي تسبب الـ Exit code 1
      run: pyinstaller --onefile --noconsole --clean vacations.py

    - name: Save Result
      uses: actions/upload-artifact@v4
      with:
        name: Final_Vacations_Program
        path: dist/*.exe
