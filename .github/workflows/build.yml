name: Build My Vacations App
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # رفعنا النسخة لـ 3.10 لتوافق أفضل مع pandas 2.2

    - name: Install Correct Versions
      run: |
        python -m pip install --upgrade pip
        # تثبيت النسخ المحددة لضمان التوافق
        pip install numpy==1.26.4 pandas==2.2.2 openpyxl==3.1.2 pyinstaller==6.6.0

    - name: Create EXE
      # أضفنا --collect-all لضمان سحب كل ملفات pandas و numpy داخل الـ EXE
      run: pyinstaller --onefile --noconsole --clean --collect-all pandas --collect-all numpy vacations.py

    - name: Save Result
      uses: actions/upload-artifact@v4
      with:
        name: Vacations_Fixed_Version
        path: dist/*.exe
