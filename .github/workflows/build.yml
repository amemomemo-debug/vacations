name: Build My Vacations App
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install PyInstaller and Libraries
      run: |
        python -m pip install --upgrade pip
        # تثبيت المكتبات الأساسية التي يحتاجها كودك لضمان النجاح
        pip install pyinstaller pandas openpyxl
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    - name: Create EXE
      # تحويل ملفك vacations.py مع تنظيف الملفات المؤقتة
      run: pyinstaller --onefile --noconsole --clean vacations.py

    - name: Save Result
      uses: actions/upload-artifact@v4
      with:
        name: Final_Vacations_Program
        path: dist/*.exe
