name: Build My Vacations App
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Clean and Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pandas openpyxl
        # إذا كان ملف requirements.txt موجوداً سيتم تثبيته، وإذا فشل لن تتوقف العملية
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    - name: Build EXE with PyInstaller
      # استخدمنا --collect-submodules لضمان تجميع كل أجزاء مكتبة pandas
      run: |
        pyinstaller --onefile --noconsole --clean --collect-submodules pandas vacations.py

    - name: Save Result
      if: always() # سيحاول حفظ النتائج حتى لو حدث فشل جزئي لفحص المجلدات
      uses: actions/upload-artifact@v4
      with:
        name: Final_Vacations_Program
        path: dist/*.exe
