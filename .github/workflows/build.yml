name: Build Protected Vacations App
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # تثبيت النسخ المتوافقة لضمان استقرار Pandas و Numpy ومنع الـ Binary Incompatibility
        pip install numpy==1.26.4 pandas==2.2.2 openpyxl==3.1.2 pyinstaller==6.6.0 pyarmor

    - name: Obfuscate Code (PyArmor)
      # تشفير الكود لحمايته من الاستخراج والاطلاع (سرية تامة)
      run: pyarmor gen vacations.py

    - name: Create Final EXE
      # بناء الملف النهائي من النسخة المشفرة مع سحب كافة ملحقات المكتبات الضخمة
      run: |
        pyinstaller --onefile --noconsole --clean --collect-all pandas --collect-all numpy dist/vacations.py

    - name: Upload Protected Program
      uses: actions/upload-artifact@v4
      with:
        name: Vacations_System_Protected
        path: dist/*.exe
